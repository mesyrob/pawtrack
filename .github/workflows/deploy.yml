name: Deploy Backend

on:
  push:
    branches: [master]
    paths:
      - "backend/**"
      - "infra/**"
      - ".github/workflows/deploy.yml"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TF_VAR_environment: dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      # Ensure ECR exists before pushing image
      - name: Terraform Apply ECR
        run: terraform apply -target=aws_ecr_repository.api -auto-approve

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push container image
        id: build
        working-directory: backend
        run: |
          IMAGE_TAG="${{ github.sha }}"
          ECR_REPO=$(cd ../infra && terraform output -raw ecr_repository_url)
          docker build -t ${ECR_REPO}:${IMAGE_TAG} .
          docker push ${ECR_REPO}:${IMAGE_TAG}
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Terraform Apply
        run: terraform apply -auto-approve -var="image_tag=${{ steps.build.outputs.image_tag }}"
